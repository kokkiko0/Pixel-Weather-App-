<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Weather</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f3f5;
            --card-bg: #ffffff;
            --text-main: #000;
            --text-secondary: #535c68;
            --blue-accent: #3867d6;
            --dash-line: #d1d8e0;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center; /* 這裡改為垂直居中 */
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        .weather-card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border: 4px solid #000;
            padding: 25px; /* 稍微增加內邊距 */
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .search-container {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
        }

        input[type="text"] {
            border: none;
            border-bottom: 2px solid #000;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            padding: 8px 5px;
            flex-grow: 1;
            outline: none;
            text-transform: uppercase;
            border-radius: 0;
        }

        .search-btn {
            background: #000;
            color: #fff;
            border: 2px solid #000;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 10px;
            margin-left: 10px;
            cursor: pointer;
        }

        .temp-weather-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .main-temp { font-size: 52px; position: relative; }
        .degree-symbol { font-size: 20px; position: absolute; top: -5px; right: -25px; }
        .feels-like { font-size: 10px; color: var(--text-secondary); margin-top: 10px; }
        .weather-desc { font-size: 12px; text-transform: capitalize; margin-top: 20px; }
        .large-icon { font-size: 55px; }
        .divider { border: none; border-top: 3px dashed var(--dash-line); margin: 30px 0; }
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .stat-label { font-size: 8px; color: var(--text-secondary); margin-bottom: 10px; }
        .stat-value { font-size: 11px; }
        #status-msg { font-size: 7px; margin-top: 30px; color: var(--blue-accent); text-align: center; }
    </style>
</head>
<body>

<div class="weather-card">
    <div class="search-container">
        <span style="color:var(--blue-accent); margin-right:8px;">📍</span>
        <input type="text" id="city-input" placeholder="CITY NAME">
        <button class="search-btn" onclick="searchCity()">GO</button>
    </div>

    <div class="temp-weather-section">
        <div class="temp-container">
            <div class="main-temp">
                <span id="temp">--</span><span class="degree-symbol">°</span>
            </div>
            <div class="feels-like">Feels like <span id="feels">--</span>°</div>
            <div class="weather-desc" id="desc">WAITING...</div>
        </div>
        <div class="large-icon" id="icon">📡</div>
    </div>

    <hr class="divider">

    <div class="details-grid">
        <div class="detail-item">
            <div class="stat-label">Humidity</div>
            <div class="stat-value" id="hum">-- %</div>
        </div>
        <div class="detail-item">
            <div class="stat-label">Wind Speed</div>
            <div class="stat-value" id="wind">-- km/h</div>
        </div>
    </div>

    <div id="status-msg">SYSTEM ONLINE</div>
</div>

<script>
    // 這裡維持原本的 JavaScript 邏輯不變
    window.onload = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude, "Current Location"),
                () => updateStatus("GPS Denied. Search manually.")
            );
        }
    };

    async function searchCity() {
        const city = document.getElementById('city-input').value;
        if (!city) return;
        updateStatus(`Searching ${city}...`);
        try {
            const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=en&format=json`);
            const geoData = await geoRes.json();
            if (geoData.results && geoData.results.length > 0) {
                const { latitude, longitude, name } = geoData.results[0];
                fetchWeather(latitude, longitude, name);
            } else { updateStatus("City not found."); }
        } catch (e) { updateStatus("Error."); }
    }

    async function fetchWeather(lat, lon, cityName) {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&timezone=auto`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            renderUI(data, cityName);
            updateStatus("Updated.");
        } catch (e) { updateStatus("API Error."); }
    }

    function renderUI(data, name) {
        const current = data.current;
        document.getElementById('city-input').value = name.toUpperCase();
        document.getElementById('temp').innerText = Math.round(current.temperature_2m);
        document.getElementById('feels').innerText = Math.round(current.apparent_temperature);
        document.getElementById('hum').innerText = current.relative_humidity_2m + "%";
        document.getElementById('wind').innerText = Math.round(current.wind_speed_10m) + " km/h";

        const code = current.weather_code;
        let desc = "Clear"; let icon = "☀️";
        if (code >= 1 && code <= 3) { desc = "Partly Cloudy"; icon = "🌤️"; }
        else if (code >= 45) { desc = "Foggy"; icon = "🌫️"; }
        else if (code >= 51 && code <= 67) { desc = "Raining"; icon = "🌧️"; }
        else if (code >= 71) { desc = "Snowing"; icon = "❄️"; }
        document.getElementById('desc').innerText = desc;
        document.getElementById('icon').innerText = icon;
    }

    function updateStatus(msg) {
        document.getElementById('status-msg').innerText = "SYSTEM: " + msg;
    }
</script>
</body>
</html>
