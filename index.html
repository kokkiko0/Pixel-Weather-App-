<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Weather (Open-Meteo)</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f3f5;
            --card-bg: #ffffff;
            --text-main: #000;
            --text-secondary: #535c68;
            --blue-accent: #3867d6;
            --dash-line: #d1d8e0;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .weather-card {
            width: 380px;
            background: var(--card-bg);
            border: 4px solid #000;
            padding: 25px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }

        /* Search Header */
        .search-container {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
        }

        input[type="text"] {
            border: none;
            border-bottom: 2px solid #000;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            padding: 5px;
            width: 180px;
            outline: none;
            text-transform: uppercase;
        }

        .search-btn {
            background: none;
            border: 2px solid #000;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            padding: 5px 10px;
            margin-left: 10px;
            cursor: pointer;
        }

        /* Main Display */
        .temp-weather-section {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .main-temp {
            font-size: 56px;
            position: relative;
            margin-bottom: 8px;
        }

        .degree-symbol { font-size: 20px; position: absolute; top: -10px; }

        .feels-like {
            font-size: 10px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .weather-desc {
            font-size: 12px;
            text-transform: capitalize;
            margin-top: 15px;
        }

        .large-icon { font-size: 60px; }

        .divider {
            border: none;
            border-top: 3px dashed var(--dash-line);
            margin: 25px 0;
        }

        /* Bottom Details */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .stat-label {
            font-size: 8px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value { font-size: 12px; }

        #status-msg {
            font-size: 7px;
            margin-top: 20px;
            color: var(--blue-accent);
        }
    </style>
</head>
<body>

<div class="weather-card">
    <div class="search-container">
        <span style="color:var(--blue-accent); margin-right:8px;">📍</span>
        <input type="text" id="city-input" placeholder="CITY NAME">
        <button class="search-btn" onclick="searchCity()">GO</button>
    </div>

    <div class="temp-weather-section">
        <div class="temp-container">
            <div class="main-temp">
                <span id="temp">--</span><span class="degree-symbol">°</span>
            </div>
            <div class="feels-like">Feels like <span id="feels">--</span>°</div>
            <div class="weather-desc" id="desc">WAITING...</div>
        </div>
        <div class="large-icon" id="icon">📡</div>
    </div>

    <hr class="divider">

    <div class="details-grid">
        <div class="detail-item">
            <div class="stat-label">Humidity</div>
            <div class="stat-value" id="hum">-- %</div>
        </div>
        <div class="detail-item">
            <div class="stat-label">Wind Speed</div>
            <div class="stat-value" id="wind">-- km/h</div>
        </div>
    </div>

    <div id="status-msg">System Booting...</div>
</div>

<script>
    // 1. 初始化：嘗試獲取當前定位
    window.onload = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude, "Current Location"),
                () => updateStatus("GPS Denied. Please search manually.")
            );
        }
    };

    // 2. 搜尋城市邏輯 (先轉經緯度，再抓天氣)
    async function searchCity() {
        const city = document.getElementById('city-input').value;
        if (!city) return;
        
        updateStatus(`Searching for ${city}...`);
        try {
            // 使用 Open-Meteo 免費的 Geocoding API
            const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=en&format=json`);
            const geoData = await geoRes.json();
            
            if (geoData.results && geoData.results.length > 0) {
                const { latitude, longitude, name } = geoData.results[0];
                fetchWeather(latitude, longitude, name);
            } else {
                updateStatus("City not found.");
            }
        } catch (e) {
            updateStatus("Geocoding failed.");
        }
    }

    // 3. 抓取天氣數據 (Open-Meteo)
    async function fetchWeather(lat, lon, cityName) {
        updateStatus(`Updating ${cityName}...`);
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&timezone=auto`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            renderUI(data, cityName);
            updateStatus("System Online.");
        } catch (e) {
            updateStatus("Weather API error.");
        }
    }

    // 4. 更新介面
    function renderUI(data, name) {
        const current = data.current;
        document.getElementById('city-input').value = name.toUpperCase();
        document.getElementById('temp').innerText = Math.round(current.temperature_2m);
        document.getElementById('feels').innerText = Math.round(current.apparent_temperature);
        document.getElementById('hum').innerText = current.relative_humidity_2m + "%";
        document.getElementById('wind').innerText = current.wind_speed_10m + " km/h";

        // Weather Code 轉換 (WMO Code)
        const code = current.weather_code;
        let desc = "Clear";
        let icon = "☀️";

        if (code >= 1 && code <= 3) { desc = "Partly Cloudy"; icon = "🌤️"; }
        else if (code >= 45) { desc = "Foggy"; icon = "🌫️"; }
        else if (code >= 51 && code <= 67) { desc = "Raining"; icon = "🌧️"; }
        else if (code >= 71) { desc = "Snowing"; icon = "❄️"; }

        document.getElementById('desc').innerText = desc;
        document.getElementById('icon').innerText = icon;
    }

    function updateStatus(msg) {
        document.getElementById('status-msg').innerText = "SYSTEM: " + msg;
    }
</script>

</body>
</html>
